<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotify Daily Charts</title>
<style>
  :root {
    --bg: #121212;
    --surface: #181818;
    --surface-2: #222;
    --text: #f5f5f5;
    --muted: #9e9e9e;
    --green: #1db954;
    --green-dim: rgba(29, 185, 84, 0.14);
    --amber: #ffb454;
    --amber-dim: rgba(255, 180, 84, 0.12);
    --red: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  h1 .dot { color: var(--green); }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .sub a { color: var(--muted); }

  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .tab:hover { border-color: var(--muted); }
  .tab.active { background: var(--green); color: #000; font-weight: 700; }

  .meta { color: var(--muted); font-size: 0.8rem; margin: 4px 0 16px; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.8rem; color: var(--muted); }
  .legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: -1px; margin-right: 5px; }

  .cards { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
  @media (min-width: 640px) { .cards { grid-template-columns: 1fr 1fr; } }
  .card { background: var(--surface); border-radius: 10px; padding: 14px 16px; }
  .card h2 { font-size: 0.95rem; margin: 0 0 10px; }
  .card ul { list-style: none; margin: 0; padding: 0; }
  .card li { margin-bottom: 6px; font-size: 0.85rem; }
  .card a { color: var(--text); text-decoration: none; }
  .card a:hover { text-decoration: underline; }
  .card .who { color: var(--muted); }
  .card .none { color: var(--muted); font-size: 0.85rem; }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 10px; overflow: hidden; }
  th {
    text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); padding: 10px 12px; border-bottom: 1px solid #2a2a2a;
  }
  td { padding: 9px 12px; border-bottom: 1px solid #1f1f1f; font-size: 0.9rem; }
  tr.entry { cursor: pointer; }
  tr.entry:hover { background: #252525; }
  tr.is-new { background: var(--green-dim); }
  tr.is-new:hover { background: rgba(29, 185, 84, 0.24); }
  tr.is-climber { background: var(--amber-dim); }
  tr.is-climber:hover { background: rgba(255, 180, 84, 0.22); }
  td.rank { width: 40px; color: var(--muted); font-variant-numeric: tabular-nums; }
  tr.is-new td.rank, tr.is-climber td.rank { color: var(--text); }
  td.move { width: 64px; font-variant-numeric: tabular-nums; font-size: 0.8rem; white-space: nowrap; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .same, .unknown { color: var(--muted); }
  td.track a { color: var(--text); text-decoration: none; font-weight: 600; }
  td.track a:hover { text-decoration: underline; color: var(--green); }
  td.track .who { display: block; color: var(--muted); font-size: 0.8rem; font-weight: 400; margin-top: 2px; }
  td.streams { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .badge {
    display: inline-block; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
    border-radius: 4px; padding: 2px 6px; margin-left: 8px; vertical-align: 1px;
  }
  .badge.new { background: var(--green); color: #000; }
  .badge.re { background: #4aa3ff; color: #000; }
  .badge.climber { background: var(--amber); color: #000; }
  .play { color: var(--muted); font-size: 0.75rem; width: 30px; text-align: center; }
  tr.entry:hover .play { color: var(--green); }

  .status { color: var(--muted); padding: 40px 0; text-align: center; }
  .status.error { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Spotify Daily Charts<span class="dot">.</span></h1>
  <div class="sub">
    Daily top songs from <a href="https://kworb.net/spotify/" target="_blank" rel="noopener">kworb.net</a>
    &middot; click any song to play it on Spotify
  </div>

  <div class="tabs" id="tabs" role="tablist"></div>
  <div class="meta" id="meta"></div>

  <div class="legend">
    <span><span class="swatch" style="background:var(--green-dim);border:1px solid var(--green)"></span>New entry / re-entry</span>
    <span><span class="swatch" style="background:var(--amber-dim);border:1px solid var(--amber)"></span>Highest climbers (top 5)</span>
  </div>

  <div class="cards">
    <div class="card">
      <h2>New entries</h2>
      <div id="new-entries"></div>
    </div>
    <div class="card">
      <h2>Highest climbers</h2>
      <div id="climbers"></div>
    </div>
  </div>

  <div id="chart"></div>
</div>

<script>
const REGIONS = [
  { key: "global", label: "🌍 Global" },
  { key: "us",     label: "🇺🇸 United States" },
  { key: "jp",     label: "🇯🇵 Japan" },
  { key: "kr",     label: "🇰🇷 South Korea" },
];
const CLIMBER_HIGHLIGHTS = 5;
const cache = {};
let current = null;

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmt = (n) => n == null ? "" : n.toLocaleString("en-US");

function moveCell(change) {
  switch (change.status) {
    case "up":    return `<span class="up">▲ ${change.delta}</span>`;
    case "down":  return `<span class="down">▼ ${Math.abs(change.delta)}</span>`;
    case "same":  return `<span class="same">=</span>`;
    case "new":   return `<span class="up">●</span>`;
    case "re-entry": return `<span class="up">◍</span>`;
    default:      return `<span class="unknown">–</span>`;
  }
}

function trackLink(e) {
  return `<a href="${esc(e.track_url)}" target="_blank" rel="noopener">${esc(e.title)}</a>`;
}

function renderCards(data, climberIds) {
  const newBox = $("new-entries");
  if (data.new_entries.length) {
    newBox.innerHTML = "<ul>" + data.new_entries.map((e) =>
      `<li>#${e.rank} ${trackLink(e)} <span class="who">— ${esc(e.artists.join(", "))}</span>` +
      ` <span class="badge new">NEW</span></li>`).join("") + "</ul>";
  } else {
    newBox.innerHTML = `<div class="none">No new entries today.</div>`;
  }

  const climbBox = $("climbers");
  const climbers = data.top_climbers;
  if (climbers.length) {
    climbBox.innerHTML = "<ul>" + climbers.map((e) =>
      `<li><span class="up">▲ ${e.change.delta}</span> to #${e.rank} — ${trackLink(e)}` +
      ` <span class="who">— ${esc(e.artists.join(", "))}</span></li>`).join("") + "</ul>";
  } else {
    climbBox.innerHTML = `<div class="none">No climbers today.</div>`;
  }
}

function renderTable(data, climberIds) {
  const hasStreams = data.entries.some((e) => e.streams != null);
  const rows = data.entries.map((e) => {
    const isNew = e.change.status === "new" || e.change.status === "re-entry";
    const isClimber = climberIds.has(e.track_id);
    let badge = "";
    if (e.change.status === "new") badge = '<span class="badge new">NEW</span>';
    else if (e.change.status === "re-entry") badge = '<span class="badge re">RE</span>';
    else if (isClimber) badge = `<span class="badge climber">▲ ${e.change.delta}</span>`;
    return `<tr class="entry${isNew ? " is-new" : isClimber ? " is-climber" : ""}"
      data-url="${esc(e.track_url)}" title="Play on Spotify">
      <td class="rank">${e.rank}</td>
      <td class="move">${moveCell(e.change)}</td>
      <td class="track">${trackLink(e)}${badge}
        <span class="who">${esc(e.artists.join(", "))}</span></td>
      ${hasStreams ? `<td class="streams">${fmt(e.streams)}</td>` : ""}
      <td class="play">▶</td>
    </tr>`;
  }).join("");

  $("chart").innerHTML = `<table>
    <thead><tr><th>#</th><th></th><th>Track</th>${hasStreams ? "<th style='text-align:right'>Streams</th>" : ""}<th></th></tr></thead>
    <tbody>${rows}</tbody></table>`;

  // whole row is clickable; plain links inside keep native behavior
  $("chart").querySelectorAll("tr.entry").forEach((tr) => {
    tr.addEventListener("click", (ev) => {
      if (ev.target.closest("a")) return;
      window.open(tr.dataset.url, "_blank", "noopener");
    });
  });
}

function render(data) {
  $("meta").textContent =
    `${data.label} — chart date ${data.chart_date} · ${data.entry_count} entries · source: ${data.source_mode}`;
  // top_climbers is ordered by rank reached; highlight the 5 biggest climbs
  const climberIds = new Set(
    [...data.top_climbers]
      .sort((a, b) => b.change.delta - a.change.delta)
      .slice(0, CLIMBER_HIGHLIGHTS)
      .map((e) => e.track_id));
  renderCards(data, climberIds);
  renderTable(data, climberIds);
}

async function show(key) {
  current = key;
  document.querySelectorAll(".tab").forEach((b) =>
    b.classList.toggle("active", b.dataset.key === key));
  if (cache[key]) { render(cache[key]); return; }

  $("chart").innerHTML = `<div class="status">Loading…</div>`;
  $("new-entries").innerHTML = "";
  $("climbers").innerHTML = "";
  $("meta").textContent = "";
  try {
    const resp = await fetch(`data/${key}.json`, { cache: "no-store" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    cache[key] = data;
    if (current === key) render(data);
  } catch (err) {
    $("chart").innerHTML =
      `<div class="status error">Could not load data/${esc(key)}.json (${esc(err.message)}).<br>
       Run <code>python scripts/fetch_charts.py</code> or trigger the GitHub Action once.</div>`;
  }
}

$("tabs").innerHTML = REGIONS.map((r) =>
  `<button class="tab" role="tab" data-key="${r.key}">${r.label}</button>`).join("");
document.querySelectorAll(".tab").forEach((b) =>
  b.addEventListener("click", () => show(b.dataset.key)));

show(new URLSearchParams(location.search).get("region") || "global");
</script>
</body>
</html>
